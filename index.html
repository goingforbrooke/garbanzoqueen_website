            (function () {
                var words = ["ARC Raiders…", "Resident Evil…", "Helldivers…", "DOOM…", "Baldur's Gate…", "Horizon: Forbidden West…", "Elden Ring…"];
                var target = document.querySelector('.element');
                var wordIndex = 0;
                var letterIndex = 0;
                var deleting = false;

                function typeLoop() {
                    if (!target) return;
                    var word = words[wordIndex];
                    target.textContent = word.slice(0, letterIndex);

                    if (!deleting && letterIndex === word.length) {
                        deleting = true;
                        setTimeout(typeLoop, 1600);
                        return;
                    }

                    if (deleting && letterIndex === 0) {
                        deleting = false;
                        wordIndex = (wordIndex + 1) % words.length;
                    }

                    letterIndex += deleting ? -1 : 1;
                    setTimeout(typeLoop, deleting ? 30 : 40);
                }

                function afterFirstPaint(callback) {
                    if ('requestIdleCallback' in window) {
                        requestIdleCallback(callback, { timeout: 1500 });
                    } else {
                        setTimeout(callback, 600);
                    }
                }

                afterFirstPaint(function () {
                    var video = document.querySelector('.bg-video');
                    var source = video && video.querySelector('source[data-src]');
                    if (!video || !source) return;

                    video.load();
                    var playPromise = video.play();
                    if (playPromise && typeof playPromise.catch === 'function') {
